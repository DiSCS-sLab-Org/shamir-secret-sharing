version: '3.8'

services:
  storage-server-a:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: sss-storage-server:latest
    container_name: sss-storage-server-a
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    environment:
      - SERVER_ID=A
      - SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s